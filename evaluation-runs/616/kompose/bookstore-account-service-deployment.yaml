apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: bookstore-account-service
  name: bookstore-account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bookstore-account-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: bookstore-account-service
    spec:
      containers:
        - env:
            - name: JAVA_TOOL_OPTIONS
              value: -Xmx512m
            - name: SERVER_PORT
              value: "4001"
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: ZIPKIN_HOST
              value: bookstore-zipkin:9411
          image: ralfx22/bsa-account-service:latest
          name: bookstore-account-service
          ports:
            - containerPort: 4001
              protocol: TCP
      hostname: bookstore-account-service
      restartPolicy: Always
