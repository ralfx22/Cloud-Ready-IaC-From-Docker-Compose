apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: sme-app
data:
  notes.txt: |
    - A single t3.small is insufficient for memory requirements; provisioning 2 nodes in the plan.
    - 'quotes' service missing from Kompose output due to missing exposed ports. Manually recreated ClusterIP Service for 'quotes' on port 5000.
    - Added containerPort 5000 to 'quotes' Deployment to match the required service port.
    - 'frontend' exposed via AWS ALB Ingress Controller targeting 'frontend' Service on port 8080.
    - Created 'sme-app' namespace and placed all resources inside it.
