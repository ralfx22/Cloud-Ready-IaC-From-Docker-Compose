apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: microservice-demo
  labels:
    app: mongo
spec:
  serviceName: mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-mongo-volume-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /mnt/mongodb/db /mnt/mongodb-config/configdb
              chown -R 999:999 /mnt/mongodb /mnt/mongodb-config
          volumeMounts:
            - name: mongodb
              mountPath: /mnt/mongodb
            - name: mongodb-config
              mountPath: /mnt/mongodb-config
      containers:
        - name: mongo
          image: mongo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: MONGO_INITDB_DATABASE
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.runCommand({ ping: 1 }).ok"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: mongodb
              mountPath: /data/db
              subPath: db
            - name: mongodb-config
              mountPath: /data/configdb
              subPath: configdb
      volumes:
        - name: mongodb
          persistentVolumeClaim:
            claimName: mongodb
        - name: mongodb-config
          persistentVolumeClaim:
            claimName: mongodb-config
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: microservice-demo
  labels:
    app: mysql
spec:
  serviceName: mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-mysql-volume-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /mnt/mysqldb/data
              chown -R 999:999 /mnt/mysqldb
          volumeMounts:
            - name: mysqldb
              mountPath: /mnt/mysqldb
      containers:
        - name: mysql
          image: mysql:5.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: MYSQL_DATABASE
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservice-demo-secrets
                  key: MYSQL_ROOT_PASSWORD
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: mysqldb
              mountPath: /var/lib/mysql
              subPath: data
      volumes:
        - name: mysqldb
          persistentVolumeClaim:
            claimName: mysqldb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: microservice-demo
  labels:
    app: postgresql
spec:
  serviceName: postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-postgresql-volume-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /mnt/postgresdb/pgdata
              chown -R 999:999 /mnt/postgresdb
          volumeMounts:
            - name: postgresdb
              mountPath: /mnt/postgresdb
      containers:
        - name: postgresql
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservice-demo-secrets
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: postgresdb
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: postgresdb
          persistentVolumeClaim:
            claimName: postgresdb
