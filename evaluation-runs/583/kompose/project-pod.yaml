apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: project
  name: project
spec:
  containers:
    - env:
        - name: DB_URI
          value: mysql+mysqldb://root:password@mysql:3306/microservice-project
      image: ralfx22/md-project
      name: project
      ports:
        - containerPort: 50052
          protocol: TCP
  restartPolicy: OnFailure
