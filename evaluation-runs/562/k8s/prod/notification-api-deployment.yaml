apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: notification-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-api
    spec:
      containers:
        - name: notification-api
          image: ralfx22/rrb-notification-api
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: spring.profiles.active
              value: docker
            - name: spring.cloud.config.uri
              value: http://config-server:8888/config-server
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 512Mi
      restartPolicy: Always
