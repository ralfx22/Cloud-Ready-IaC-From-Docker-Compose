apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: microservice-demo
data:
  notes: |
    Migration Notes - Docker Compose to Kubernetes (EKS)
    ====================================================

    1. WORKLOAD CONVERSION:
       - All bare Pods generated by Kompose have been converted to Deployments (stateless services)
         and StatefulSets (databases) per the architecture plan.
       - Stateless: user, project, task, api, api-gateway -> Deployment (replicas: 1)
       - Stateful: postgresql, mysql, mongo -> StatefulSet (replicas: 1)

    2. SERVICE PORT CORRECTION:
       - Kompose mapped Compose host ports (8080, 8081, 8082, 8083) as Service ports.
         These have been corrected to use container ports directly (50051, 50052, 50053, 50059)
         since inter-service env vars reference container ports.

    3. POSTGRESQL LIVENESS PROBE FIX:
       - Kompose generated a malformed exec command with the entire shell command as a single string.
         Fixed to use: /bin/sh -c "pg_isready -U postgres -d microservice-task"

    4. POSTGRESQL PGDATA:
       - Set PGDATA=/var/lib/postgresql/data/pgdata to use a subdirectory, avoiding initdb
         complaints about non-empty directory caused by lost+found on freshly formatted EBS volumes.

    5. DATABASE CREDENTIALS:
       - POSTGRES_PASSWORD, POSTGRES_USER, POSTGRES_DB moved to Secret "postgresql-secret".
       - MYSQL_ROOT_PASSWORD, MYSQL_DATABASE moved to Secret "mysql-secret".
       - WARNING: Credentials are stored as plaintext stringData in Secret manifests.
         For production, use an external secrets manager (e.g., AWS Secrets Manager with
         ExternalSecrets operator or IRSA-based injection).
       - DB_URI env vars in application services still contain inline credentials.
         These should be refactored to construct URIs from Secret references.

    6. STORAGE:
       - Standalone PVCs from Kompose have been replaced by volumeClaimTemplates in StatefulSets.
       - No storageClassName is specified; the cluster default StorageClass will be used.
       - EBS CSI driver add-on is required for dynamic provisioning.
       - MongoDB uses two PVCs: /data/db (data) and /data/configdb (config metadata).
       - PVC sizes: postgresql 1Gi, mysql 1Gi, mongodb 1Gi, mongodb-config 100Mi.
         Adjust for production workloads.

    7. SECURITY CONTEXT:
       - fsGroup: 999 set on postgresql, mysql, and mongo StatefulSet pod specs to ensure
         mounted EBS volumes are accessible by the database processes running as non-root.
       - PostgreSQL official image uses uid/gid 999 (postgres user).
       - MySQL 5.7 official image uses uid/gid 999 (mysql user).
       - MongoDB official image uses uid/gid 999 (mongodb user).

    8. INGRESS:
       - ALB Ingress created for api-gateway on port 9090 (HTTP only, no TLS).
       - AWS Load Balancer Controller must be installed in the cluster.
       - Public subnets must be tagged with kubernetes.io/role/elb=1.
       - No TLS/certificate-arn configured; HTTP-only for baseline validation.

    9. BUILD CONTEXTS:
       - Docker Compose references build contexts (./userService, ./projectService,
         ./taskService, ./apiService). These are not applicable in Kubernetes.
         Pre-built images are used: ralfx22/md-user, ralfx22/md-project, ralfx22/md-task,
         ralfx22/md-api. Ensure these images are pushed to an accessible registry.
       - api-gateway uses the same image as api (ralfx22/md-api) with "proxy" command.
         Compose had pull_policy: never which is not applicable in K8s.

    10. RESTART POLICIES:
        - Compose restart policies (no, on-failure) have been replaced by Kubernetes
          Deployment/StatefulSet defaults (Always) which is appropriate for long-running services.

    11. DEPENDS_ON / STARTUP ORDER:
        - Docker Compose depends_on with health checks is not natively supported in K8s.
          Services should implement retry/backoff logic for dependent service connections.
          Consider using init containers if strict ordering is required.

    12. PLATFORM:
        - project and mysql had platform: linux/amd64. This is handled at the container
          runtime/node level in EKS (amd64 nodes assumed with t3.small instances).

    13. KOMPOSE WARNINGS:
        - Volume directory warnings are expected - named Docker volumes don't map to host paths;
          PVCs handle this correctly in Kubernetes.
        - 'version' key in docker-compose.yml is obsolete - informational only.

    14. PROBES:
        - Database liveness probes retained as they have exact exec commands from Compose healthchecks.
        - No probes added for application services (user, project, task, api, api-gateway)
          as no exact port+path or exec commands were evidenced in the Compose file.
