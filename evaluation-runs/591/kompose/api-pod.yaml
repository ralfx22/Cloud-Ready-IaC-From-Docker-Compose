apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: api
  name: api
spec:
  containers:
    - args:
        - serve
      env:
        - name: PROJECT_ADDRESS
          value: project:50052
        - name: TASK_ADDRESS
          value: task:50053
        - name: USER_ADDRESS
          value: user:50051
      image: ralfx22/md-api
      name: api
      ports:
        - containerPort: 50059
          protocol: TCP
  restartPolicy: Never
