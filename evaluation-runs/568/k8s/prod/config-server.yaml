apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: rrb-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: ralfx22/rrb-config-server
          ports:
            - containerPort: 8888
          env:
            - name: spring.profiles.active
              value: docker

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: rrb-microservices
spec:
  type: ClusterIP
  ports:
    - name: "8888"
      port: 8888
      targetPort: 8888
  selector:
    app: config-server
