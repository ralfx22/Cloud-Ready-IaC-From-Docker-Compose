apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: rrb-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:2.24.0
          ports:
            - containerPort: 9411
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: rrb-microservices
spec:
  type: ClusterIP
  ports:
    - name: "9411"
      port: 9411
      targetPort: 9411
  selector:
    app: zipkin
