apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: bookstore-frontend
  name: bookstore-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bookstore-frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: bookstore-frontend
    spec:
      containers:
        - env:
            - name: BACKEND_API_GATEWAY_URL
              value: http://localhost:8765
          image: ralfx22/bsa-frontend:latest
          name: bookstore-frontend
          ports:
            - containerPort: 80
              protocol: TCP
      hostname: bookstore-frontend
      restartPolicy: Always
