apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-influxdb
  namespace: bookstore
  labels:
    app: bookstore-influxdb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookstore-influxdb
  template:
    metadata:
      labels:
        app: bookstore-influxdb
    spec:
      initContainers:
        - name: init-influxdb-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /mnt/influxdb-data && chmod 0777 /mnt/influxdb-data
          volumeMounts:
            - name: booksture-influxdb-volume
              mountPath: /mnt
      containers:
        - name: bookstore-influxdb
          image: influxdb:1.8
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          volumeMounts:
            - name: booksture-influxdb-volume
              mountPath: /var/lib/influxdb
              subPath: influxdb-data
      volumes:
        - name: booksture-influxdb-volume
          persistentVolumeClaim:
            claimName: booksture-influxdb-volume
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-influxdb
  namespace: bookstore
  labels:
    app: bookstore-influxdb
spec:
  type: ClusterIP
  selector:
    app: bookstore-influxdb
  ports:
    - name: http
      port: 8086
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-kapacitor
  namespace: bookstore
  labels:
    app: bookstore-kapacitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstore-kapacitor
  template:
    metadata:
      labels:
        app: bookstore-kapacitor
    spec:
      containers:
        - name: bookstore-kapacitor
          image: kapacitor:1.7
          env:
            - name: KAPACITOR_HOSTNAME
              value: bookstore-kapacitor
            - name: KAPACITOR_INFLUXDB_0_URLS_0
              value: http://bookstore-influxdb:8086
          ports:
            - name: http
              containerPort: 9092
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-kapacitor
  namespace: bookstore
  labels:
    app: bookstore-kapacitor
spec:
  type: ClusterIP
  selector:
    app: bookstore-kapacitor
  ports:
    - name: http
      port: 9092
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-chronograf
  namespace: bookstore
  labels:
    app: bookstore-chronograf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookstore-chronograf
  template:
    metadata:
      labels:
        app: bookstore-chronograf
    spec:
      initContainers:
        - name: init-chronograf-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /mnt/chronograf-data && chmod 0777 /mnt/chronograf-data
          volumeMounts:
            - name: booksture-chronograf-volume
              mountPath: /mnt
      containers:
        - name: bookstore-chronograf
          image: chronograf:1.7.3
          env:
            - name: INFLUXDB_URL
              value: http://bookstore-influxdb:8086
            - name: KAPACITOR_URL
              value: http://bookstore-kapacitor:9092
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: booksture-chronograf-volume
              mountPath: /var/lib/chronograf
              subPath: chronograf-data
      volumes:
        - name: booksture-chronograf-volume
          persistentVolumeClaim:
            claimName: booksture-chronograf-volume
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-chronograf
  namespace: bookstore
  labels:
    app: bookstore-chronograf
spec:
  type: ClusterIP
  selector:
    app: bookstore-chronograf
  ports:
    - name: http
      port: 8888
      targetPort: http
      protocol: TCP
