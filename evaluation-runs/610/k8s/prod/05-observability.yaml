apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-prometheus
  namespace: bookstore
  labels:
    app: bookstore-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstore-prometheus
  template:
    metadata:
      labels:
        app: bookstore-prometheus
    spec:
      containers:
        - name: bookstore-prometheus
          image: ralfx22/bsa-prometheus:latest
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-prometheus
  namespace: bookstore
  labels:
    app: bookstore-prometheus
spec:
  type: ClusterIP
  selector:
    app: bookstore-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-grafana
  namespace: bookstore
  labels:
    app: bookstore-grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookstore-grafana
  template:
    metadata:
      labels:
        app: bookstore-grafana
    spec:
      securityContext:
        fsGroup: 472
      initContainers:
        - name: init-grafana-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /mnt/grafana-data && chown -R 472:472 /mnt/grafana-data
          volumeMounts:
            - name: bookstore-graphana-volume
              mountPath: /mnt
      containers:
        - name: bookstore-grafana
          image: ralfx22/bsa-grafana:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: bookstore-graphana-volume
              mountPath: /var/lib/grafana
              subPath: grafana-data
      volumes:
        - name: bookstore-graphana-volume
          persistentVolumeClaim:
            claimName: bookstore-graphana-volume
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-grafana
  namespace: bookstore
  labels:
    app: bookstore-grafana
spec:
  type: ClusterIP
  selector:
    app: bookstore-grafana
  ports:
    - name: http
      port: 3030
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
