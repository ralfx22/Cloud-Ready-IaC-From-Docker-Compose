apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-consul-discovery
  namespace: bookstore
  labels:
    app: bookstore-consul-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstore-consul-discovery
  template:
    metadata:
      labels:
        app: bookstore-consul-discovery
    spec:
      containers:
        - name: bookstore-consul-discovery
          image: hashicorp/consul
          ports:
            - name: http
              containerPort: 8500
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-consul-discovery
  namespace: bookstore
  labels:
    app: bookstore-consul-discovery
spec:
  type: ClusterIP
  selector:
    app: bookstore-consul-discovery
  ports:
    - name: http
      port: 8500
      targetPort: http
      protocol: TCP
---
