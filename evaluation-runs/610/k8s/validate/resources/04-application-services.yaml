    metadata:
      labels:
        app: bookstore-frontend
    spec:
      containers:
        - name: bookstore-frontend
          image: ralfx22/bsa-frontend:latest
          env:
            - name: BACKEND_API_GATEWAY_URL
              value: http://bookstore-zuul-api-gateway-server:8765
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
---
