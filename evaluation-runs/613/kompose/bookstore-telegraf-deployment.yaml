apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: bookstore-telegraf
  name: bookstore-telegraf
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bookstore-telegraf
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: bookstore-telegraf
    spec:
      containers:
        - env:
            - name: HOSTNAME
              value: bookstore-telegraf
          image: ralfx22/bsa-telegraf:latest
          name: bookstore-telegraf
          ports:
            - containerPort: 8125
              protocol: UDP
      hostname: bookstore-telegraf
      restartPolicy: Always
