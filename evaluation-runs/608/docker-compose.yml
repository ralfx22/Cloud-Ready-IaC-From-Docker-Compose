version: '3.8'

services:
    user:
        build:
            context: ./userService
        image: ralfx22/md-user
        restart: "no"
        environment:
            - DB_URI=mongodb://mongo:27017/
            - DB_NAME=Microservice-demo-user
        ports:
            - 8080:50051
        depends_on:
            mongo:
                condition: service_healthy

    project:
        build:
            context: ./projectService
        image: ralfx22/md-project
        platform: linux/amd64
        restart: on-failure
        environment:
            - DB_URI=mysql+mysqldb://root:password@mysql:3306/microservice-project
        ports:
            - 8081:50052
        depends_on:
            mysql:
                condition: service_healthy
            user:
                condition: service_started

    task:
        build:
            context: ./taskService
        image: ralfx22/md-task
        restart: on-failure
        entrypoint: [./init]
        environment:
            - USER_ADDRESS=user:50051
            - PROJECT_ADDRESS=project:50052
            - DB_URI=postgres://postgres:password@postgresql:5432/microservice-task
        ports:
            - 8082:50053
        depends_on:
            postgresql:
                condition: service_healthy
            user:
                condition: service_started
            project:
                condition: service_started

    api:
        build:
            context: ./apiService
        image: ralfx22/md-api
        restart: "no"
        environment:
            - USER_ADDRESS=user:50051
            - PROJECT_ADDRESS=project:50052
            - TASK_ADDRESS=task:50053
        ports:
            - 8083:50059
        command: serve
        depends_on:
            - user
            - project
            - task


    api-gateway:
        image: ralfx22/md-api
        pull_policy: never
        restart: "no"
        environment:
            - HOST=api
            - PORT=50059
            - PROXY_PORT=9090
        ports:
            - 9090:9090
        command: proxy
        depends_on:
            - api
    
    postgresql:
        image: postgres:16
        restart: "no"
        ports:
            - 5432:5432
        environment:
            POSTGRES_DB: microservice-task
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
        volumes:
            - postgresdb:/var/lib/postgresql/data/
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d microservice-task"]
            interval: 5s
            timeout: 5s
            retries: 20

    mysql:
        image: mysql:5.7
        platform: linux/amd64
        restart: "no"
        environment:
            MYSQL_DATABASE: microservice-project
            MYSQL_ROOT_PASSWORD: password
        ports:
            - 3306:3306
        volumes:
            - mysqldb:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
            interval: 5s
            timeout: 5s
            retries: 20

    mongo:
        image: mongo
        restart: "no"
        environment:
            MONGO_INITDB_DATABASE: Microservice-demo-user
        ports:
            - 27017:27017
        volumes:
            - mongodb:/data/db
            - mongodb_config:/data/configdb
        healthcheck:
            test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    postgresdb:
    mysqldb:
    mongodb:
    mongodb_config: