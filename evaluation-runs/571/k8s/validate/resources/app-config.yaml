apiVersion: v1
kind: ConfigMap
metadata:
  name: wger-env
  namespace: wger
  labels:
    app.kubernetes.io/part-of: wger
data: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: wger-env-secret
  namespace: wger
  labels:
    app.kubernetes.io/part-of: wger
type: Opaque
data: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: wger
  labels:
    app.kubernetes.io/name: db
    app.kubernetes.io/part-of: wger
type: Opaque
stringData:
  POSTGRES_PASSWORD: "wger"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: wger
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: wger
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      client_max_body_size 50m;

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /static/ {
        alias /wger/static/;
        access_log off;
        expires 1h;
      }

      location /media/ {
        alias /wger/media/;
        access_log off;
        expires 1h;
      }

      location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: wger
  labels:
    app.kubernetes.io/name: cache
    app.kubernetes.io/part-of: wger
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    dir /data
    appendonly yes
    save 60 1000
