apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: microservice-demo
spec:
  type: ClusterIP
  ports:
    - name: tcp
      port: 27017
      targetPort: 27017
  selector:
    app: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: microservice-demo
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mongo
          image: mongo
          env:
            - name: MONGO_INITDB_DATABASE
              value: Microservice-demo-user
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: mongodb
              mountPath: /data/db
              subPath: db
            - name: mongodb-config
              mountPath: /data/configdb
              subPath: configdb
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.runCommand({ ping: 1 }).ok"
            failureThreshold: 20
            periodSeconds: 5
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongodb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: mongodb-config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
