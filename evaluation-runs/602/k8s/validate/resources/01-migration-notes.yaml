apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: microservice-demo
data:
  migration.txt: |
    - Converted raw Pods generated by Kompose to Deployments and StatefulSets.
    - The api-gateway service image is set to pull_policy: never in compose. Ensure the image 'ralfx22/md-api' is available in the cluster or change imagePullPolicy before production deployment.
    - Re-mapped inter-service environment variables (e.g., USER_ADDRESS=user:8080) to target the Kubernetes Service ports instead of raw container ports.
    - Substituted raw PVCs with volumeClaimTemplates in StatefulSets for PostgreSQL, MySQL, and MongoDB.
    - Added subPaths to database mounts and PGDATA for PostgreSQL to handle AWS EBS lost+found directories on newly formatted volumes.
    - MongoDB, PostgreSQL, and MySQL have securityContext.fsGroup set to 999 to resolve persistent volume permission issues upon EBS mount.
    - Added linux/amd64 nodeSelectors for project and mysql deployments to align with compose architecture requests.
