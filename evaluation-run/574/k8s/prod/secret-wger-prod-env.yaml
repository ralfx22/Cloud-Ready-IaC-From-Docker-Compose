apiVersion: v1
kind: Secret
metadata:
  name: wger-prod-env
  namespace: wger
  labels:
    app.kubernetes.io/part-of: wger
type: Opaque
stringData:
  # === PLACEHOLDER: fill in all required values before deploying ===
  SECRET_KEY: "change-me-to-a-random-string"
  DATABASE_URL: "postgresql://wger:wger@db:5432/wger"
  CACHE_URL: "redis://cache:6379/0"
  TIME_ZONE: "Europe/Berlin"
  EXERCISE_CACHE_TTL: "18000"
  DJANGO_DEBUG: "False"
  WGER_USE_GUNICORN: "True"
  ENABLE_EMAIL: "False"
  EMAIL_HOST: ""
  EMAIL_PORT: "587"
  EMAIL_HOST_USER: ""
  EMAIL_HOST_PASSWORD: ""
  FROM_EMAIL: ""
  ALLOW_REGISTRATION: "True"
  ALLOW_GUEST_USERS: "True"
  MIN_ACCOUNT_AGE_TO_TRUST: "21"
  STATIC_URL: "/static/"
