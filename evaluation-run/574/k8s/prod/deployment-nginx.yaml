apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: wger
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: wger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
    spec:
      initContainers:
        - name: copy-static
          image: docker.io/wger/server:latest
          command:
            - /bin/sh
            - -c
            - wger bootstrap --no-process-static && python3 manage.py collectstatic --no-input --clear && cp -r /home/wger/static/. /tmp/static/
          envFrom:
            - secretRef:
                name: wger-prod-env
          volumeMounts:
            - name: static
              mountPath: /tmp/static
      containers:
        - name: nginx
          image: docker.io/nginx:stable
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: static
              mountPath: /wger/static
              readOnly: true
            - name: media
              mountPath: /wger/media
              readOnly: true
          livenessProbe:
            exec:
              command:
                - service
                - nginx
                - status
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: static
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: media
