apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-management-api
  namespace: rrb-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asset-management-api
  template:
    metadata:
      labels:
        app: asset-management-api
    spec:
      containers:
        - name: asset-management-api
          image: ralfx22/rrb-asset-management-api
          env:
            - name: spring.cloud.config.uri
              value: http://config-server:8888/config-server
            - name: spring.profiles.active
              value: docker
