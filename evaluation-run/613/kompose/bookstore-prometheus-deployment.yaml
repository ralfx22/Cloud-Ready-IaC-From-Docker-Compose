apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: bookstore-prometheus
  name: bookstore-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bookstore-prometheus
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: bookstore-prometheus
    spec:
      containers:
        - image: ralfx22/bsa-prometheus:latest
          name: bookstore-prometheus
          ports:
            - containerPort: 9090
              protocol: TCP
      hostname: bookstore-prometheus
      restartPolicy: Always
