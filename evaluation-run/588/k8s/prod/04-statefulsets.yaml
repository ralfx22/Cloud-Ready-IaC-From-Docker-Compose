apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: microservice-demo
  labels:
    app.kubernetes.io/name: mongo
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-mongo-volume
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - mkdir -p /mnt/db/mongodb-data /mnt/config/mongodb-config-data && chown -R 999:999 /mnt/db/mongodb-data /mnt/config/mongodb-config-data
          volumeMounts:
            - name: mongodb
              mountPath: /mnt/db
            - name: mongodb-config
              mountPath: /mnt/config
      containers:
        - name: mongo
          image: mongo
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: mongo-initdb-database
          ports:
            - containerPort: 27017
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.runCommand({ ping: 1 }).ok"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: mongodb
              mountPath: /data/db
              subPath: mongodb-data
            - name: mongodb-config
              mountPath: /data/configdb
              subPath: mongodb-config-data
      volumes:
        - name: mongodb
          persistentVolumeClaim:
            claimName: mongodb
        - name: mongodb-config
          persistentVolumeClaim:
            claimName: mongodb-config
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: microservice-demo
  labels:
    app.kubernetes.io/name: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-mysql-volume
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - mkdir -p /mnt/mysql/mysql-data && chown -R 999:999 /mnt/mysql/mysql-data
          volumeMounts:
            - name: mysqldb
              mountPath: /mnt/mysql
      containers:
        - name: mysql
          image: mysql:5.7
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: mysql-database
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservice-demo-secrets
                  key: mysql-root-password
          ports:
            - containerPort: 3306
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - -ppassword
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: mysqldb
              mountPath: /var/lib/mysql
              subPath: mysql-data
      volumes:
        - name: mysqldb
          persistentVolumeClaim:
            claimName: mysqldb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: microservice-demo
  labels:
    app.kubernetes.io/name: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-postgres-volume
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - mkdir -p /mnt/postgres/pgdata && chown -R 999:999 /mnt/postgres/pgdata
          volumeMounts:
            - name: postgresdb
              mountPath: /mnt/postgres
      containers:
        - name: postgresql
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: microservice-demo-config
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservice-demo-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -d microservice-task
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: postgresdb
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: postgresdb
          persistentVolumeClaim:
            claimName: postgresdb
