apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: bookstore
data:
  notes: |
    - Namespace 'bookstore' was added and all resources are scoped to it.
    - All services are kept as ClusterIP to match the architecture plan. Only bookstore-zuul-api-gateway-server is exposed publicly through an ALB-backed Ingress.
    - No probes were included because Compose and the generated manifests did not provide exact, evidenced probe definitions.
    - The frontend BACKEND_API_GATEWAY_URL value was changed from http://localhost:8765 to http://bookstore-zuul-api-gateway-server:8765 because localhost is not Kubernetes-safe for inter-service communication.
    - MySQL credentials were moved from inline environment variables into the Secret 'bookstore-mysql-db-secret'. The values come directly from the source Compose file and should be rotated for non-validation use.
    - The duplicate MySQL Service port generated by Kompose was removed; the Service now exposes a single TCP port 3306.
    - PersistentVolumeClaims were preserved for MySQL, Grafana, InfluxDB, and Chronograf. The typoed PVC names from source intent/generated manifests were preserved where already in use: bookstore-graphana-volume, booksture-influxdb-volume, and booksture-chronograf-volume.
    - MySQL uses a PVC subPath ('mysql') so a freshly formatted EBS volume's lost+found directory at the mount root does not interfere with /var/lib/mysql.
    - InfluxDB also uses a PVC subPath ('influxdb-data') to avoid mount-root artifacts on newly provisioned volumes.
    - Grafana was given pod fsGroup 472 because it commonly runs as a non-root user and writes persistent data under /var/lib/grafana.
    - Telegraf's Compose mount of /var/run/docker.sock was not carried into Kubernetes. Docker-socket-based metrics collection will not function in this baseline EKS deployment unless redesigned for Kubernetes-native metrics sources.
    - Kompose warnings about missing checks for /var/lib/chronograf, /var/lib/grafana, /var/lib/influxdb, and /var/lib/mysql were treated as conversion-time host inspection issues only; they did not change the decision to keep these paths PVC-backed.
    - The Compose version field was obsolete according to Kompose; this did not affect the Kubernetes manifests.
    - The ALB Ingress depends on the AWS Load Balancer Controller being installed and configured in the cluster, with suitable subnet discovery tags and IRSA permissions.
    - PVC binding depends on a working default StorageClass in the cluster and the EBS CSI driver being installed/configured for EKS.
    - Several images remain unresolved artifact risks for validation and future production hardening: ralfx22/bsa-api-gateway:latest, ralfx22/bsa-account-service:latest, ralfx22/bsa-billing-service:latest, ralfx22/bsa-catalog-service:latest, ralfx22/bsa-order-service:latest, ralfx22/bsa-payment-service:latest, ralfx22/bsa-frontend:latest, ralfx22/bsa-prometheus:latest, ralfx22/bsa-grafana:latest, ralfx22/bsa-telegraf:latest, and upstream unpinned images such as influxdb and kapacitor. The local build instructions referenced in Compose were not validated here.
    - No Kubernetes CRDs or non-core custom resources were added.
    - The manifests are Kubernetes-only and contain no Terraform resources.
