apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: microservice-demo
data:
  notes: |
    Migration Notes - Docker Compose to Kubernetes (EKS)
    ====================================================

    1. WORKLOAD TYPE CONVERSION:
       - All bare Pods generated by Kompose have been converted to Deployments
         (user, project, task, api, api-gateway) and StatefulSets (postgresql,
         mysql, mongo) per the architecture plan.

    2. SERVICE PORT NORMALIZATION:
       - Kompose used host-side Compose ports as Service ports (user:8080,
         project:8081, task:8082, api:8083). These have been corrected to match
         container ports (user:50051, project:50052, task:50053, api:50059) so
         that internal gRPC service references resolve correctly.

    3. DATABASE CREDENTIALS:
       - POSTGRES_PASSWORD, MYSQL_ROOT_PASSWORD, and DB_URI values containing
         passwords were plain-text env vars. They have been moved to Kubernetes
         Secret resources (postgresql-credentials, mysql-credentials,
         mongo-credentials, app-db-uris) and referenced via secretKeyRef.
       - WARNING: The passwords in the Secrets are still the original plain-text
         values from docker-compose.yml. For production, replace these with
         strong secrets and consider using AWS Secrets Manager with ExternalSecrets
         operator (CRD not included here).

    4. POSTGRESQL LIVENESS PROBE FIX:
       - Kompose generated the healthcheck command as a single string:
         'pg_isready -U postgres -d microservice-task'. This has been fixed to
         use [sh, -c, 'pg_isready -U postgres -d microservice-task'].

    5. POSTGRESQL PGDATA SUBDIR:
       - PGDATA env var set to /var/lib/postgresql/data/pgdata to avoid
         conflicts with lost+found directory on freshly formatted EBS volumes.

    6. STORAGE:
       - Standalone PVCs from Kompose have been replaced with
         volumeClaimTemplates in StatefulSets.
       - A gp3 StorageClass is created as the cluster default. EBS CSI driver
         add-on must be installed on the EKS cluster for PVC provisioning.
       - Volume sizes increased from 100Mi to 1Gi for database data volumes
         to allow reasonable runtime usage.

    7. FSGROUP SECURITY CONTEXT:
       - mysql StatefulSet: fsGroup=999 (mysql user group in mysql:5.7 image).
       - mongo StatefulSet: fsGroup=999 (mongodb user group in mongo image).
       - postgresql: Not needed because postgres:16 image runs initdb as root
         and PGDATA subdir avoids lost+found conflict.

    8. BUILD CONTEXT / IMAGE ARTIFACTS:
       - Services user, project, task, and api have build contexts in Compose
         (./userService, ./projectService, ./taskService, ./apiService).
         Kubernetes cannot build images. Pre-built images are referenced:
         ralfx22/md-user, ralfx22/md-project, ralfx22/md-task, ralfx22/md-api.
       - api-gateway uses the same image as api (ralfx22/md-api) with
         'proxy' command, matching the Compose definition.
       - Ensure these images are pushed to a registry accessible from the
         EKS cluster (Docker Hub public or ECR).

    9. INGRESS:
       - ALB Ingress created for api-gateway on port 9090 (HTTP only).
       - No TLS/ACM certificate configured per plan (HTTP-only baseline).
       - AWS Load Balancer Controller must be installed on the cluster.
       - Public subnets must be tagged with kubernetes.io/role/elb=1.

    10. KOMPOSE WARNINGS (resolved):
        - 'version is obsolete': Harmless, Compose v3.8 version field.
        - 'File don't exist' warnings for volume mount paths: Expected;
          these are named volumes that become PVCs in Kubernetes.

    11. RESTART POLICY:
        - Compose 'restart: no' and 'restart: on-failure' have been replaced
          by Deployment/StatefulSet default behavior (always restart pods).
          This is the correct Kubernetes pattern for long-running services.

    12. DEPENDS_ON:
        - Compose depends_on with service_healthy conditions are not
          directly supported in Kubernetes. Services should handle
          connection retries at the application level. Init containers
          could be added if startup ordering is critical.

    13. PLATFORM FIELD:
        - 'platform: linux/amd64' on project and mysql services is not
          directly supported in K8s manifests. EKS nodes are assumed to be
          amd64 (t3.small). If multi-arch nodes are used, add nodeSelector
          for kubernetes.io/arch=amd64.

    14. PULL POLICY:
        - api-gateway had 'pull_policy: never' in Compose. This is a local
          dev setting. In Kubernetes the default pull policy applies
          (IfNotPresent for tagged images). The image must exist in the
          registry.
