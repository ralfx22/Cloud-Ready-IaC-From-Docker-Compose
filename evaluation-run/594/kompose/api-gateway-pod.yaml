apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: api-gateway
  name: api-gateway
spec:
  containers:
    - args:
        - proxy
      env:
        - name: HOST
          value: api
        - name: PORT
          value: "50059"
        - name: PROXY_PORT
          value: "9090"
      image: ralfx22/md-api
      name: api-gateway
      ports:
        - containerPort: 9090
          protocol: TCP
  restartPolicy: Never
