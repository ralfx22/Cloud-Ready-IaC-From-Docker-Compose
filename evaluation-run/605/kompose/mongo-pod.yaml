apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: mongo
  name: mongo
spec:
  containers:
    - env:
        - name: MONGO_INITDB_DATABASE
          value: Microservice-demo-user
      image: mongo
      livenessProbe:
        exec:
          command:
            - mongosh
            - --quiet
            - --eval
            - 'db.runCommand({ ping: 1 }).ok'
        failureThreshold: 20
        periodSeconds: 5
        timeoutSeconds: 5
      name: mongo
      ports:
        - containerPort: 27017
          protocol: TCP
      volumeMounts:
        - mountPath: /data/db
          name: mongodb
        - mountPath: /data/configdb
          name: mongodb-config
  restartPolicy: Never
  volumes:
    - name: mongodb
      persistentVolumeClaim:
        claimName: mongodb
    - name: mongodb-config
      persistentVolumeClaim:
        claimName: mongodb-config
