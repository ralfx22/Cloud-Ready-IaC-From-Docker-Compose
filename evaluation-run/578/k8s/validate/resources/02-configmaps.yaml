apiVersion: v1
kind: ConfigMap
metadata:
  name: wger-env
  namespace: wger
data:
  SECRET_KEY: "placeholder_key"
  SITE_URL: "http://localhost"
  ALLOW_REGISTRATION: "True"
  DB_ENGINE: "django.db.backends.postgresql"
  DB_NAME: "wger"
  DB_USER: "wger"
  DB_PASSWORD: "wger"
  DB_HOST: "db"
  DB_PORT: "5432"
  CELERY_BROKER_URL: "redis://cache:6379/0"
  CELERY_RESULT_BACKEND: "redis://cache:6379/0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: wger
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        client_max_body_size 100M;
        
        location / {
            proxy_pass http://web:8000;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
        }
        
        location /static/ {
            alias /wger/static/;
        }
        
        location /media/ {
            alias /wger/media/;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-conf
  namespace: wger
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
