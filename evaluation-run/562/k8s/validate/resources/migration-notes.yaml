apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: migration-notes
data:
  notes: |
    === RRB-App Docker Compose to Kubernetes Migration Notes ===

    1. BARE PODS CONVERTED TO DEPLOYMENTS:
       - account-api, api-gateway, asset-management-api, discovery-server,
         notification-api, transaction-api were generated as bare Pods by Kompose
         (due to missing ports or restart: on-failure). All converted to Deployments
         with proper labels and selectors.

    2. MISSING SERVICES CREATED:
       - account-api, asset-management-api, notification-api, transaction-api had
         no Services generated by Kompose. ClusterIP Services created on port 8080
         (assumed Spring Boot default) for inter-service DNS resolution.

    3. DUPLICATE SERVICE PORTS REMOVED:
       - Kompose generated duplicate port entries (e.g. '27017' and '27017-tcp')
         for account-api-mongo, api-gateway, asset-management-api-mysql,
         config-server, discovery-server, transaction-api-postgres. Deduplicated.

    4. VOLUME MOUNT PATHS CORRECTED:
       - account-api-mongo: /data/mongo -> /data/db (MongoDB default data dir)
       - asset-management-api-mysql: /data/mysql -> /var/lib/mysql (MySQL default)
       - transaction-api-postgres: /data/postgres -> /var/lib/postgresql/data (PostgreSQL default)
       - grafana: /var/lib/grafana kept as-is (correct)

    5. POSTGRES LOST+FOUND HANDLING:
       - PGDATA env var set to /var/lib/postgresql/data/pgdata (subdirectory)
         so PostgreSQL does not fail when encountering lost+found from EBS formatting.

    6. MYSQL LOST+FOUND HANDLING:
       - Added --ignore-db-dir=lost+found arg to MySQL container.

    7. CONFIG-SERVER VOLUME:
       - Compose mounted ./config-files:/app/resources/config-files (local directory).
       - Kompose created a PVC (config-server-claim0) which is incorrect for config data.
       - PVC REMOVED. Config files must either be baked into the container image or
         provided as a ConfigMap at deploy time. The volume mount has been removed.
       - ACTION REQUIRED: Provide config files via ConfigMap or ensure they are in the image.

    8. PROMETHEUS CONFIGURATION:
       - Compose mounted ./prometheus-configuration.yml as a single config file.
       - Kompose created a PVC (prometheus-claim0) which is incorrect for a config file.
       - PVC REMOVED and replaced with a ConfigMap (prometheus-config) containing a
         placeholder prometheus.yml.
       - ACTION REQUIRED: Replace placeholder prometheus.yml content with actual
         prometheus-configuration.yml content.

    9. KAFKA NETWORKING (SINGLE-POD KRAFT MODE):
       - KAFKA_CONTROLLER_QUORUM_VOTERS changed from 1@notification-api-kafka:29093
         to 1@localhost:29093 because controller and broker run in the same pod.
       - KAFKA_LISTENERS controller address changed to CONTROLLER://localhost:29093
         for pod-local addressing.
       - PLAINTEXT listener changed to 0.0.0.0:29092 to accept connections from
         other pods via the Service.
       - KAFKA_ADVERTISED_LISTENERS kept PLAINTEXT://notification-api-kafka:29092
         for inter-pod access and HOST://localhost:9092 for pod-local access.
       - Service exposes both 29092 (primary broker) and 9092 (host listener).

    10. SECRETS CREATED:
        - mysql-secrets: MYSQL_USER, MYSQL_PASSWORD, MYSQL_ROOT_PASSWORD
        - postgres-secrets: POSTGRES_USER, POSTGRES_PASSWORD
        - grafana-secrets: GF_SECURITY_ADMIN_USER, GF_SECURITY_ADMIN_PASSWORD
        - WARNING: These contain the original plaintext values from docker-compose.
          Replace with strong passwords before production use.
        - Grafana env vars normalized to uppercase (GF_SECURITY_ADMIN_USER/PASSWORD)
          which is the canonical Grafana env var format.

    11. STORAGE:
        - StorageClass gp3 created (EBS CSI driver required as EKS add-on).
        - PVCs: account-api-mongo-data, asset-management-api-mysql-data,
          transaction-api-postgres-data, grafana-data (all 1Gi, RWO, gp3).
        - Removed incorrect PVCs: config-server-claim0, prometheus-claim0.
        - fsGroup set on database pods for volume ownership:
          mongo (999), mysql (999), postgres (999), grafana (472), prometheus (65534).

    12. INGRESS:
        - ALB Ingress created for api-gateway (internet-facing, HTTP only on port 80).
        - Requires AWS Load Balancer Controller to be installed on the cluster.
        - TLS not configured (HTTP-only baseline). Add certificate-arn annotation
          and SSL redirect for production.
        - healthcheck-path set to /actuator/health (Spring Boot convention).

    13. PROBES:
        - All probes OMITTED. No exact port+path evidence was provided in the
          Compose file. Spring Boot services likely support /actuator/health but
          this is not confirmed. Add liveness/readiness probes after validation.

    14. RESOURCE REQUESTS/LIMITS:
        - Memory requests and limits set per architecture plan estimates.
        - CPU requests/limits not set (allow scheduler flexibility).

    15. IMAGE PULL POLICY:
        - Custom images (ralfx22/*) set to Always (matching Compose pull_policy: always).
        - Third-party images with pinned tags use default (IfNotPresent).

    16. ALL SERVICES ARE ClusterIP:
        - Only api-gateway is exposed externally via ALB Ingress.
        - All other services are internal ClusterIP only.

    17. UNRESOLVED BUILD/ARTIFACT ISSUES:
        - No build contexts in Compose; all images are from registries. No issues.
        - config-server config-files directory content is unknown and must be provided.
        - prometheus-configuration.yml content is unknown and must be provided.
