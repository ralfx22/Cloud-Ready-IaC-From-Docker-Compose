apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: rrb-app
  labels:
    app.kubernetes.io/part-of: rrb-app
type: Opaque
stringData:
  MYSQL_USER: admin
  MYSQL_PASSWORD: pwd
  MYSQL_ROOT_PASSWORD: pwd
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: rrb-app
  labels:
    app.kubernetes.io/part-of: rrb-app
type: Opaque
stringData:
  POSTGRES_USER: root
  POSTGRES_PASSWORD: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: rrb-app
  labels:
    app.kubernetes.io/part-of: rrb-app
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: password
