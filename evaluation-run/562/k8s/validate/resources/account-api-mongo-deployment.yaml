apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api-mongo
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: account-api-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-api-mongo
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: account-api-mongo
          image: mongo:6.0.5
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 512Mi
      restartPolicy: Always
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: account-api-mongo-data
