apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: microservice-demo
type: Opaque
stringData:
  POSTGRES_DB: microservice-task
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: microservice-demo
type: Opaque
stringData:
  MYSQL_DATABASE: microservice-project
  MYSQL_ROOT_PASSWORD: password
