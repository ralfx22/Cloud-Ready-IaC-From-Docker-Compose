apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: user
  name: user
spec:
  containers:
    - env:
        - name: DB_NAME
          value: Microservice-demo-user
        - name: DB_URI
          value: mongodb://mongo:27017/
      image: ralfx22/md-user
      name: user
      ports:
        - containerPort: 50051
          protocol: TCP
  restartPolicy: Never
