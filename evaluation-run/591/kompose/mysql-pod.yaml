apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: mysql
  name: mysql
spec:
  containers:
    - env:
        - name: MYSQL_DATABASE
          value: microservice-project
        - name: MYSQL_ROOT_PASSWORD
          value: password
      image: mysql:5.7
      livenessProbe:
        exec:
          command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -uroot
            - -ppassword
        failureThreshold: 20
        periodSeconds: 5
        timeoutSeconds: 5
      name: mysql
      ports:
        - containerPort: 3306
          protocol: TCP
      volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysqldb
  restartPolicy: Never
  volumes:
    - name: mysqldb
      persistentVolumeClaim:
        claimName: mysqldb
