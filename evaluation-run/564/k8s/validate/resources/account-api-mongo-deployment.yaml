apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api-mongo
  namespace: rrb-app
  labels:
    app: account-api-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: account-api-mongo
    spec:
      containers:
        - name: account-api-mongo
          image: mongo:6.0.5
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      restartPolicy: Always
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: account-api-mongo-data
