apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb
  namespace: microservice-demo
  labels:
    app: mongo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
