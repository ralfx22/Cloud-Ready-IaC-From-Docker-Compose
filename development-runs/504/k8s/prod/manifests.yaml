apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api-kafka
  namespace: default
  labels:
    app: notification-api-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api-kafka
  template:
    metadata:
      labels:
        app: notification-api-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.4.0
          env:
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: CLUSTER_ID
              value: MkU3OEVANTcwNTJENDM2Qk
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://localhost:29092,HOST://localhost:9092
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:29093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
          ports:
            - containerPort: 9092
              name: kafka-host
            - containerPort: 29092
              name: kafka
            - containerPort: 29093
              name: controller
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api-kafka
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: notification-api-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
