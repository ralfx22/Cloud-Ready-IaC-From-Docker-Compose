apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.0.1
          env:
            - name: gf_security_admin_user
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: gf_security_admin_user
            - name: gf_security_admin_password
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: gf_security_admin_password
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-claim0
---
