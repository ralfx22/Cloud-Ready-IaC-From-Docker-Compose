apiVersion: v1
kind: Namespace
metadata:
  name: default
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: default
type: Opaque
stringData:
  gf_security_admin_user: admin
  gf_security_admin_password: password
---
apiVersion: v1
kind: Secret
metadata:
  name: asset-management-api-mysql-secret
  namespace: default
type: Opaque
stringData:
  MYSQL_PASSWORD: pwd
  MYSQL_ROOT_PASSWORD: pwd
---
apiVersion: v1
kind: Secret
metadata:
  name: transaction-api-postgres-secret
  namespace: default
type: Opaque
stringData:
  POSTGRES_PASSWORD: admin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: account-api-mongo-claim0
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asset-management-api-mysql-claim0
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config-server-claim0
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-claim0
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: transaction-api-postgres-claim0
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api-mongo
  namespace: default
  labels:
    app: account-api-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: account-api-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0.5
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: account-api-mongo-claim0
---
apiVersion: v1
kind: Service
metadata:
  name: account-api-mongo
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: account-api-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-management-api-mysql
  namespace: default
  labels:
    app: asset-management-api-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asset-management-api-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: asset-management-api-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.33
          args:
            - --default-authentication-plugin=mysql_native_password
          env:
            - name: MYSQL_DATABASE
              value: mysql
            - name: MYSQL_USER
              value: admin
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asset-management-api-mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asset-management-api-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: asset-management-api-mysql-claim0
---
apiVersion: v1
kind: Service
metadata:
  name: asset-management-api-mysql
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: asset-management-api-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-api-postgres
  namespace: default
  labels:
    app: transaction-api-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-api-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: transaction-api-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15.2
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transaction-api-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: transaction-api-postgres-claim0
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-api-postgres
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: transaction-api-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: default
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: ralfx22/rrb-config-server
          env:
            - name: spring.profiles.active
              value: docker
          ports:
            - containerPort: 8888
              name: http
          volumeMounts:
            - name: config-files
              mountPath: /app/resources/config-files
      volumes:
        - name: config-files
          persistentVolumeClaim:
            claimName: config-server-claim0
---
