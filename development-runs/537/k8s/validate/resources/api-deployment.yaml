apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sme-app
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - env:
            - name: QUOTES_API
              value: http://quotes:5000
          image: ralfx22/sme-api:v2
          name: api
          ports:
            - containerPort: 3000
              protocol: TCP
