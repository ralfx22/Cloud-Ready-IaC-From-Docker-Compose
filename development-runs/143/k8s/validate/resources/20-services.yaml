apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sme-app
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sme-app
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: quotes
  namespace: sme-app
  labels:
    app: quotes
spec:
  type: ClusterIP
  selector:
    app: quotes
  ports:
    - name: http
      port: 5000
      targetPort: 5000
