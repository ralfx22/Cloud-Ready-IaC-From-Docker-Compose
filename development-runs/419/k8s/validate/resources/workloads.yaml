apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: rrb-app
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.0.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: gf_security_admin_user
              valueFrom:
                secretKeyRef:
                  name: app-config-secret
                  key: GRAFANA_ADMIN_USER
            - name: gf_security_admin_password
              valueFrom:
                secretKeyRef:
                  name: app-config-secret
                  key: GRAFANA_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
