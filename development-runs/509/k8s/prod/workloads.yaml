apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api
  namespace: rrb-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-api
  template:
    metadata:
      labels:
        app: account-api
    spec:
      containers:
        - name: account-api
          image: ralfx22/rrb-account-api
          env:
            - name: spring.profiles.active
              valueFrom:
                configMapKeyRef:
                  name: rrb-app-config
                  key: SPRING_PROFILES_ACTIVE
            - name: spring.cloud.config.uri
              valueFrom:
                configMapKeyRef:
                  name: rrb-app-config
                  key: SPRING_CLOUD_CONFIG_URI
          ports:
            - containerPort: 8080
---
