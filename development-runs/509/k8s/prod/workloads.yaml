apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: rrb-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.0.1
          env:
            - name: gf_security_admin_user
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: gf_security_admin_password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-claim0
---
