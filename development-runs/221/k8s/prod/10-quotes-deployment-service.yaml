---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotes
  namespace: app
  labels:
    io.kompose.service: quotes
  annotations:
    kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: quotes
  template:
    metadata:
      labels:
        io.kompose.service: quotes
      annotations:
        kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
        kompose.version: "1.34.0 (cbf2835db)"
    spec:
      containers:
        - name: quotes
          image: ralfx22/sme-quotes:latest
          ports:
            - containerPort: 5000
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: quotes
  namespace: app
  labels:
    io.kompose.service: quotes
  annotations:
    kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    io.kompose.service: quotes
  ports:
    - name: "5000"
      port: 5000
      targetPort: 5000