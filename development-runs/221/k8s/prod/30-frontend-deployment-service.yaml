---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app
  labels:
    io.kompose.service: frontend
  annotations:
    kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      labels:
        io.kompose.service: frontend
      annotations:
        kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
        kompose.version: "1.34.0 (cbf2835db)"
    spec:
      containers:
        - name: frontend
          image: ralfx22/sme-frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app
  labels:
    io.kompose.service: frontend
  annotations:
    kompose.cmd: kompose convert -f docker-compose-221.yml -o k8s-221/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    io.kompose.service: frontend
  ports:
    - name: "8080"
      port: 8080
      targetPort: 80