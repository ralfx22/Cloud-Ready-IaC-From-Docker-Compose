apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: sme-app
data:
  notes: |-
    Kompose warnings / conversion notes:
    - WARN: docker-compose 'version' is obsolete (conversion tool warning).
    - WARN: Service 'quotes' wasn't created by Kompose because 'ports' was not specified in the Compose file.

    Decisions and assumptions applied in these manifests:
    - Created Namespace 'sme-app' and placed all resources in it (per architecture plan).
    - Kept Deployments for api, frontend, quotes as generated by Kompose. Set replicas=1 (Kompose default).
    - Created ClusterIP Service for 'quotes' on port 5000 (Kompose omitted this). This aligns with the Compose intent and the architecture plan so the api can call http://quotes:5000.
    - Kept api Service as ClusterIP on port 3000. Although Compose mapped the api to the host, the architecture plan specifies api is internal (not exposed).
    - Kept frontend Service as ClusterIP on port 8080 (targetPort 80). Created an Ingress (ALB) to provide an internet-facing HTTP entrypoint for validation.
    - Ingress uses spec.ingressClassName: alb and ALB annotations to request an internet-facing ALB (HTTP only) per plan. No TLS/certificate configured for baseline smoke tests.
    - Added containerPort: 5000 to the quotes Deployment to reflect the expected listening port; confirm the image listens on 5000 before adding probes.
    - Omitted liveness/readiness/startup probes because no exact port/path/exec was evidenced in the inputs. Add probes later when application endpoints are confirmed.
    - No PVCs or non-standard CRDs are used. No ExternalSecrets, ServiceMonitor, cert-manager, or other controllers are assumed.

    Follow-up items (not implemented here):
    - Confirm quotes container listens on 5000; add appropriate readiness/liveness probes.
    - Install AWS Load Balancer Controller with IRSA and ensure public subnets are tagged so the ALB can be provisioned.
    - Consider replicas and autoscaling based on load; add HPAs if metrics-server is installed.
    - If persistent storage is needed later, add PVCs and StorageClasses as required.
