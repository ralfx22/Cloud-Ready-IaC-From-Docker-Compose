apiVersion: v1
kind: Service
metadata:
  name: quotes
  namespace: sme-app
  labels:
    io.kompose.service: quotes
  annotations:
    note: "Service added during migration to satisfy internal DNS and API expectation at http://quotes:5000"
spec:
  type: ClusterIP
  selector:
    io.kompose.service: quotes
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
