apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sme-app
  labels:
    io.kompose.service: frontend
  annotations:
    kompose.cmd: kompose convert -f docker-compose-318.yml -o k8s-318/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    io.kompose.service: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
