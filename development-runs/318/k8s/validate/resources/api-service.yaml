apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sme-app
  labels:
    io.kompose.service: api
  annotations:
    kompose.cmd: kompose convert -f docker-compose-318.yml -o k8s-318/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    io.kompose.service: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
