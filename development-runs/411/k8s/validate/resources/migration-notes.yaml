apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
data:
  notes: |
    - Namespace set from architecture plan: rrb-app.
    - Replaced Kompose-generated standalone Pods for account-api, api-gateway, asset-management-api, discovery-server, notification-api, and transaction-api with Deployments for restart stability and standard service selection.
    - Created a public ALB-backed Ingress for api-gateway only, per architecture plan. Service remains ClusterIP.
    - Kept all other Services internal as ClusterIP.
    - Removed duplicate Service ports generated by Kompose where the same port appeared twice.
    - Converted database workloads with clear stateful intent to StatefulSets: account-api-mongo, asset-management-api-mysql, transaction-api-postgres.
    - Corrected nonstandard persistence mount paths to image-conventional data directories:
      - MongoDB: /data/mongo -> /data/db
      - MySQL: /data/mysql -> /var/lib/mysql
      - PostgreSQL: /data/postgres -> /var/lib/postgresql/data
    - Preserved Grafana persistence at /var/lib/grafana using a PVC.
    - Removed config-server PVC because /app/resources/config-files is config-like, not runtime data. Source config-files directory was reported missing, so no ConfigMap content was assumed.
    - Removed Prometheus PVC because /etc/prometheus/prometheus.yml is a config file path, not persistent runtime data. Source prometheus configuration file was reported missing, so no ConfigMap content was assumed.
    - Classified sensitive values into Secrets:
      - MySQL credentials
      - PostgreSQL credentials
      - Grafana admin credentials
    - Kept non-sensitive Spring and logging environment variables directly in workload specs.
    - Kafka listener settings were rewritten for Kubernetes-safe single-pod operation:
      - Removed Docker-specific HOST listener and localhost advertised endpoint intended for host access
      - Set advertised listener to notification-api-kafka:9092
      - Set controller quorum voter to pod-local 127.0.0.1:29093
      - Separated client/broker service address from pod-local controller address
    - No probes were added. Any probes not explicitly evidenced by exact path/port or exec were omitted by instruction.
    - No CRDs were introduced; manifests use standard Kubernetes APIs only.
    - Kompose warnings recorded:
      - Docker Compose version field marked obsolete.
      - Host bind mounts were unsupported and source paths were missing for account-api-mongo, asset-management-api-mysql, config-server, grafana, prometheus, and transaction-api-postgres.
      - Services account-api, asset-management-api, notification-api, and transaction-api were not created by Kompose because ports were not specified.
    - Unresolved application-level assumptions:
      - Internal application connection details for MongoDB/MySQL/PostgreSQL/Redis/Kafka were not present as explicit env in Compose and were not inferred beyond preserving service names.
      - config-server and prometheus may require external configuration content not available in the provided inputs.
