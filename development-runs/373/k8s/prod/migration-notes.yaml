apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: default
data:
  notes: |
    - Architecture plan JSON was empty; default namespace 'default' was used.
    - Replaced Kompose-generated standalone Pods for account-api, api-gateway, asset-management-api, discovery-server, notification-api, and transaction-api with Deployments for better controller-managed behavior.
    - Added missing ClusterIP Services for account-api, asset-management-api, notification-api, and transaction-api because Kompose omitted them when no ports were specified.
    - For services without explicit ports in compose (account-api, asset-management-api, notification-api, transaction-api), assumed application port 8080 as a best-effort Spring microservice default based on ecosystem context; this may need adjustment.
    - Kept all Services as ClusterIP and exposed api-gateway via a standard Ingress configured for AWS Load Balancer Controller with ingressClassName 'alb'.
    - No TLS/certificate ARN was provided in inputs, so Ingress is HTTP-only.
    - Removed duplicate Service port entries emitted by Kompose where the same port was listed twice.
    - Preserved existing PVCs; host source paths from docker-compose could not be represented directly in standard Kubernetes and remain abstracted behind PVCs.
    - Config-server and Prometheus volume mounts originate from local files/directories in compose that were unavailable during conversion; manifests retain PVC-backed mounts as generated by Kompose, but application data/config may be incomplete until provided separately.
    - Prometheus mount path /etc/prometheus/prometheus.yml is a file path but Kompose created a PVC-backed volume mount; this is preserved for apply compatibility, but runtime behavior may require replacing with a ConfigMap-mounted file.
    - Kafka compose listeners advertise port 29092 internally while only 9092 is exposed via Service/containerPort in the generated manifests; runtime connectivity may require Kafka-specific listener reconfiguration.
    - No probes were included because no exact readiness/liveness/startup probe definitions were evidenced in the source inputs.
    - Compose depends_on ordering was not translated because Kubernetes does not guarantee startup order in standard manifests.
