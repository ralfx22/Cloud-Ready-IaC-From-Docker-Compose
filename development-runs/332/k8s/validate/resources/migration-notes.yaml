apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: sme-app
  labels:
    app: migration-notes
data:
  notes: |
    - Namespace 'sme-app' created and all app resources placed into it (do not use default namespace).
    - Kompose warnings: 'version is obsolete' in compose file; 'Service "quotes" won't be created because ports not specified'.
    - Added a ClusterIP Service for 'quotes' on port 5000 to match the original Compose intent and the API's QUOTES_API environment (http://quotes:5000).
    - Added containerPort 5000 to the quotes Deployment based on architecture plan intent. This must be confirmed against the application/Dockerfile; adjust if incorrect.
    - Kept Deployments for api, frontend, and quotes (no StatefulSet used).
    - Removed/omitted any liveness/readiness probes because no explicit probe endpoints or ports were present in the source manifests or compose file. Add probes once exact paths/ports are confirmed.
    - Services for api and frontend remain ClusterIP as requested by the architecture plan. Service selectors match the pod labels generated by Kompose.
    - Created an Ingress with ingressClassName: alb and AWS Load Balancer Controller annotations to expose the frontend via an internet-facing ALB on HTTP (port 80). TLS is not configured for baseline validation.
    - Preconditions for ALB Ingress: install AWS Load Balancer Controller (with IRSA/OIDC), ensure public subnets are tagged/discoverable, and controller has required IAM permissions.
    - No PersistentVolumeClaims were present in the compose output; no PVCs were added. No EBS CSI or other CRD-based controllers are required by these manifests.
    - Additional operational notes: ensure cluster add-ons (vpc-cni, kube-proxy, coredns) are healthy before applying workloads. Provision nodes (recommended 2 x t3.medium) and enable OIDC for IRSA for the Load Balancer Controller.
