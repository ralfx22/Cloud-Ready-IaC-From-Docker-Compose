apiVersion: v1
kind: Namespace
metadata:
  name: quotes-app
  labels:
    app.kubernetes.io/name: quotes-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: quotes-app
  labels:
    app.kubernetes.io/part-of: quotes-app
data:
  summary: |
    - Deploy all application resources into the dedicated namespace quotes-app.
    - Keep frontend, api, and quotes as stateless Deployments with replica count 1.
    - Keep all Services as ClusterIP and expose only frontend through an internet-facing AWS ALB Ingress.
    - Use HTTP only for the baseline Ingress because no TLS or ACM certificate requirement was provided.
    - No PVCs or other storage resources were created because neither Compose nor Kompose defined any volumes.
  assumptions: |
    - Added an internal ClusterIP Service for quotes on port 5000 because api is configured with QUOTES_API=http://quotes:5000 and the architecture plan requires api-to-quotes connectivity.
    - Added containerPort 5000 to the quotes Deployment to align the pod with the expected internal HTTP endpoint.
    - QUOTES_API was preserved as non-secret runtime configuration via the api-config ConfigMap.
    - No probes were added because no exact HTTP path, TCP socket, or exec command was evidenced in the provided inputs.
  kompose_warnings: |
    - docker-compose.yml version "2" was reported as obsolete.
    - Service "quotes" was not generated by Kompose because no ports were specified.
    - Compose depends_on does not create Kubernetes startup ordering; workloads must tolerate dependency retries during startup.
  unresolved_issues: |
    - The Compose file references local build contexts only. Replace example.com/quotes-app/* image placeholders with real registry coordinates after building and publishing the images.
    - No registry location, image tags beyond the baseline placeholder, Secrets, DNS hostnames, or TLS certificate ARN were specified, so those were not added.
    - Frontend reachability through the ALB depends on the AWS Load Balancer Controller being installed and permitted in the target EKS cluster.
    - Runtime success depends on the quotes container actually serving HTTP on port 5000 as implied by QUOTES_API and the architecture plan.
