apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
