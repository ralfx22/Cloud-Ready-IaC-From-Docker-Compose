apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: sme-app
data:
  notes: "Migration and assumptions:\n- Namespace 'sme-app' created and all resources placed in this namespace.\n- Kompose omitted a Service for 'quotes' because no ports were declared; added a ClusterIP Service 'quotes' exposing port 5000 to satisfy QUOTES_API=http://quotes:5000 used by 'api'.\n- Services created as ClusterIP: 'frontend' (port 8080 -> target 80), 'api' (3000 -> 3000), 'quotes' (5000 -> 5000).\n- Ingress created (ingressClassName: alb) to expose the frontend service via an internet-facing ALB on HTTP port 80. Annotations added for AWS Load Balancer Controller: alb.ingress.kubernetes.io/scheme, alb.ingress.kubernetes.io/target-type, alb.ingress.kubernetes.io/listen-ports.\n- TLS/ACM not configured: HTTP-only ALB chosen for baseline smoke tests per plan. If TLS is required, add alb.ingress.kubernetes.io/certificate-arn and redirect annotations.\n- Probes omitted intentionally: no readiness or liveness probes were added because exact probe paths/ports were not evidenced in the source. Add explicit probes when application endpoints are known.\n- No PVCs or hostPath volumes detected; no storage manifests added.\n- Deployments kept (not StatefulSet) as no stateful behavior was evident.\n- Replicas left at 1 (as generated by Kompose). Adjust replicas and resource requests/limits as needed for production.\n- AWS Load Balancer Controller and IRSA, public subnet tagging, and IAM roles are required for ALB provisioning (outside the scope of these manifests).\n- Ensure cluster components (vpc-cni, coredns, kube-proxy) are healthy before nodegroup creation per architecture plan.\n- If the quotes service actually listens on a different port than 5000, update the 'quotes' Deployment/service targetPort accordingly."