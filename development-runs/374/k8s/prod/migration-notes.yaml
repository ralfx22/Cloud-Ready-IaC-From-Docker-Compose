apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
data:
  notes: |
    - Namespace set to rrb-app per architecture plan.
    - All resources were normalized into the rrb-app namespace.
    - Pod resources generated by Kompose for account-api, api-gateway, asset-management-api, discovery-server, notification-api, and transaction-api were converted to Deployments for safer baseline behavior on Kubernetes.
    - Services were kept internal as ClusterIP, matching the plan.
    - A single public Ingress was added for api-gateway using ingressClassName alb and AWS Load Balancer Controller annotations.
    - TLS was not configured because the architecture plan indicates HTTP-only baseline validation and no ACM certificate ARN was provided.
    - Duplicate Service ports emitted by Kompose were collapsed to a single port per Service to ensure clean validation.
    - No probes were added or retained because no exact HTTP path, TCP socket probe, or exec probe was evidenced in the source manifests.
    - account-api, asset-management-api, notification-api, and transaction-api do not have Services because the Compose source defined no ports for them and the plan notes accept them as internal standalone workloads.
    - Host path source volumes from Compose were not portable to Kubernetes. Existing Kompose PVCs were preserved for account-api-mongo, asset-management-api-mysql, config-server, grafana, prometheus, and transaction-api-postgres.
    - config-server originally referenced ./config-files, but that source content is not available in these manifests. The PVC mount remains, so runtime behavior may differ from Compose intent.
    - prometheus originally referenced ./prometheus-configuration.yml, but that source file is not available in these manifests. The PVC mount remains, so Prometheus may not start correctly without a valid configuration file being provided separately.
    - MySQL, Postgres, and Grafana credentials remain plain environment variables for baseline compatibility; hardening to Secrets is recommended later.
    - Kafka configuration from Compose was preserved as environment variables. Only port 9092 is exposed via Service because that is what Kompose generated and what the plan includes.
    - No CRDs or non-standard Kubernetes APIs were added.
