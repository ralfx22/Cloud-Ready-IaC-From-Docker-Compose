apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: account-api-mongo-claim0
  name: account-api-mongo-claim0
  namespace: rrb-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: account-api-mongo
  name: account-api-mongo
  namespace: rrb-app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: account-api-mongo
    spec:
      containers:
        - image: mongo:6.0.5
          name: account-api-mongo
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - mountPath: /data/mongo
              name: account-api-mongo-claim0
      volumes:
        - name: account-api-mongo-claim0
          persistentVolumeClaim:
            claimName: account-api-mongo-claim0
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: account-api-mongo
  name: account-api-mongo
  namespace: rrb-app
spec:
  type: ClusterIP
  ports:
    - name: tcp-27017
      port: 27017
      protocol: TCP
      targetPort: 27017
  selector:
    io.kompose.service: account-api-mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: account-api
  name: account-api
  namespace: rrb-app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: account-api
  template:
    metadata:
      labels:
        io.kompose.service: account-api
    spec:
      containers:
        - env:
            - name: spring.cloud.config.uri
              value: http://config-server:8888/config-server
            - name: spring.profiles.active
              value: docker
          image: ralfx22/rrb-account-api
          imagePullPolicy: Always
          name: account-api
---
apiVersion: apps/v1
