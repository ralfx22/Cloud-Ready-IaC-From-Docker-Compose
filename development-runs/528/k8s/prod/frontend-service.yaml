apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sme-app
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: sme-app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
