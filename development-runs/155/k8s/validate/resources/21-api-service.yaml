apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: app
  labels:
    io.kompose.service: api
    app: api
  annotations:
    kompose.cmd: kompose convert -f docker-compose-150.yml -o k8s-150/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
      protocol: TCP
