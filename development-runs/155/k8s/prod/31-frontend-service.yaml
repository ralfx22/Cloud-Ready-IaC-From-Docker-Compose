apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app
  labels:
    io.kompose.service: frontend
    app: frontend
  annotations:
    kompose.cmd: kompose convert -f docker-compose-150.yml -o k8s-150/
    kompose.version: "1.34.0 (cbf2835db)"
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: "8080"
      port: 8080
      targetPort: 80
      protocol: TCP
