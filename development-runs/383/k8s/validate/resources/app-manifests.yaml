apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: account-api-mongo
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: account-api-mongo
spec:
  serviceName: account-api-mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account-api-mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-api-mongo
    spec:
      containers:
        - name: account-api-mongo
          image: mongo:6.0.5
          ports:
            - name: mongo
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: account-api-mongo-data
