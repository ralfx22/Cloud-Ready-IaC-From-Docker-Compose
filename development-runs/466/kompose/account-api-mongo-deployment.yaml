apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f 466/docker-compose.yml -o 466-kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: account-api-mongo
  name: account-api-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f 466/docker-compose.yml -o 466-kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: account-api-mongo
    spec:
      containers:
        - image: mongo:6.0.5
          name: account-api-mongo
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - mountPath: /data/mongo
              name: account-api-mongo-claim0
      restartPolicy: Always
      volumes:
        - name: account-api-mongo-claim0
          persistentVolumeClaim:
            claimName: account-api-mongo-claim0
