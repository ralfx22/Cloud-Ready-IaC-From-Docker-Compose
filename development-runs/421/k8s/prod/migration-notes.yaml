apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
data:
  notes: |
    - Namespace set to rrb-app per architecture plan.
    - Replaced Kompose-generated standalone Pods for account-api, asset-management-api, api-gateway, discovery-server, notification-api, and transaction-api with Deployments for safer reconciliation behavior.
    - Removed duplicate Service port entries generated by Kompose.
    - Kept all Services as ClusterIP per plan.
    - Added ALB-backed Ingress for api-gateway only, HTTP-only, internet-facing, target-type ip, per plan.
    - No probes were added because no exact probe paths/commands were evidenced in source inputs.
    - Compose depends_on ordering is not enforced in Kubernetes; applications must tolerate dependency startup delays.
    - Converted inline sensitive environment variables for Grafana, MySQL, and PostgreSQL into a Kubernetes Secret.
    - Retained PVC-backed persistence for MongoDB, MySQL, Grafana, and PostgreSQL.
    - Removed Kompose PVC for config-server because /app/resources/config-files is config-like, not runtime data; host source was missing during conversion and no concrete files were provided.
    - Removed Kompose PVC for Prometheus because /etc/prometheus/prometheus.yml is config-like and file-path PVC mounting is not appropriate; supplied a minimal ConfigMap-based prometheus.yml instead.
    - Corrected database mount paths to image-appropriate runtime data directories: MongoDB to /data/db, MySQL to /var/lib/mysql, PostgreSQL to /var/lib/postgresql/data with subPath pgdata to avoid lost+found issues on fresh volumes.
    - Added pod securityContext.fsGroup for Grafana (472) and PostgreSQL (999) to improve write access on mounted persistent volumes for non-root/default image users.
    - Kafka Compose listener settings were Docker-specific and not Kubernetes-safe. Rewrote listeners to pod-local and Service-safe values: PLAINTEXT on 0.0.0.0:9092, CONTROLLER on 0.0.0.0:29093, advertised PLAINTEXT as notification-api-kafka:9092, controller quorum voter as 1@localhost:29093.
    - Internal self-reference for Kafka controller quorum was rewritten to localhost because this is a single-pod combined broker/controller topology.
    - Portless application services account-api, asset-management-api, notification-api, and transaction-api remain without Services because no container ports were evidenced.
    - Host bind mount contents referenced in Compose for config-files and prometheus configuration were not available during conversion and were not preserved as hostPath.
    - Validation assumes a default StorageClass exists in the cluster for PVC binding.
