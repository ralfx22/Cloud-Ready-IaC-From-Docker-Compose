    kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: account-api-mongo
  name: account-api-mongo
  namespace: rrb-app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o kompose/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: account-api-mongo
