apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f 415-docker-compose.yml -o 415-k8s/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: config-server
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: config-server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f 415-docker-compose.yml -o 415-k8s/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: config-server
    spec:
      containers:
        - env:
            - name: spring.profiles.active
              value: docker
          image: ralfx22/rrb-config-server
          name: config-server
          ports:
            - containerPort: 8888
              protocol: TCP
          volumeMounts:
            - mountPath: /app/resources/config-files
              name: config-server-claim0
      restartPolicy: Always
      volumes:
        - name: config-server-claim0
          persistentVolumeClaim:
            claimName: config-server-claim0
