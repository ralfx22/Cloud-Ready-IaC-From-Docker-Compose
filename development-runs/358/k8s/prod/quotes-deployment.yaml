---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose-358.yml -o k8s-358/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: quotes
  name: quotes
  namespace: sme-app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: quotes
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose-358.yml -o k8s-358/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: quotes
    spec:
      containers:
        - image: ralfx22/sme-quotes:v2
          name: quotes
          ports:
            - containerPort: 5000
              protocol: TCP
      restartPolicy: Always
