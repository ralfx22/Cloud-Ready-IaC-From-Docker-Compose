apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
data:
  notes: |
    - Namespace set to rrb-app per architecture plan.
    - Replaced Kompose standalone Pods for account-api, api-gateway, asset-management-api, discovery-server, notification-api, and transaction-api with Deployments for safer restart behavior in Kubernetes.
    - Added a standard Ingress for api-gateway with ingressClassName alb and AWS Load Balancer Controller annotations for internet-facing HTTP validation.
    - Kept Services as ClusterIP per architecture plan; only api-gateway is externally reachable through Ingress.
    - Removed duplicate service port entries generated by Kompose.
    - No probes were added because exact probe path/port/exec evidence was not provided in the source inputs.
    - MongoDB persistent mount corrected from /data/mongo to /data/db based on official image runtime data path.
    - MySQL persistent mount corrected from /data/mysql to /var/lib/mysql based on official image runtime data path.
    - PostgreSQL persistent mount corrected from /data/postgres to /var/lib/postgresql/data and PGDATA set to /var/lib/postgresql/data/pgdata to avoid lost+found issues on fresh volumes.
    - Converted MongoDB, MySQL, and PostgreSQL database workloads to StatefulSets as low-risk stateful corrections aligned with the architecture plan.
    - Added fsGroup for MySQL, PostgreSQL, and Grafana to improve writable volume behavior for non-root or image-managed users.
    - Config-server PVC from Kompose was intentionally removed because /app/resources/config-files is config-like, not persistent runtime data; source host files were missing, so no ConfigMap content could be safely generated.
    - Prometheus PVC from Kompose was intentionally removed because /etc/prometheus/prometheus.yml is a config file path, not persistent runtime data; source file was missing, so deployment falls back to image defaults and remains a functional gap.
    - Kafka networking was rewritten for Kubernetes safety: removed HOST listener usage, advertised listener now uses service DNS notification-api-kafka:9092, and controller quorum voter uses localhost because broker and controller are colocated in one pod.
    - Kafka remains non-persistent because no Compose volume or existing PVC was defined; this is a durability gap for baseline validation.
    - Redis remains ephemeral because no persistence intent was declared.
    - MySQL, PostgreSQL, and Grafana sensitive inline environment values were moved into Kubernetes Secrets.
    - account-api, asset-management-api, notification-api, and transaction-api still have no Services because no ports were declared in Compose or generated manifests; baseline preserves them as internal workloads only.
    - Host bind source paths referenced by Compose were missing or unsupported during Kompose conversion; final manifests avoid hostPath usage.
    - Existing Kompose-generated manifests for removed PVC-backed config mounts and pod resources should not be applied alongside these final manifests, as they would conflict by name or intent.
