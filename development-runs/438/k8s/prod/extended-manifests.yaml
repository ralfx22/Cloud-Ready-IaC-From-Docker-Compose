apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-notes
  namespace: rrb-app
data:
  notes: |
    - Namespace set from architecture plan: rrb-app.
    - Replaced Kompose-generated standalone Pods for account-api, api-gateway, asset-management-api, discovery-server, notification-api, and transaction-api with Deployments for better Kubernetes behavior.
    - Added Services for account-api, asset-management-api, notification-api, and transaction-api because Kompose omitted them when ports were not specified in Compose. Ports for these services were not evidenced by Compose or generated manifests, so placeholder ClusterIP Services were not created for them to avoid invalid assumptions.
    - Kept planned ClusterIP Services for api-gateway, account-api-mongo, asset-management-api-mysql, config-server, discovery-server, grafana, notification-api-kafka, prometheus, redis, transaction-api-postgres, and zipkin.
    - Added ALB-backed Ingress for api-gateway per architecture plan. HTTP-only baseline; no TLS or ACM certificate configured.
    - Removed duplicate Service port entries generated by Kompose.
    - Removed all probes because none were explicitly evidenced by exact path/port or exec definitions.
    - Preserved application environment variables. Secret-like values were moved to Kubernetes Secrets for MySQL, PostgreSQL, and Grafana.
    - MongoDB persistent mount corrected from /data/mongo to /data/db because /data/db is the standard MongoDB runtime data path.
    - MySQL persistent mount corrected from /data/mysql to /var/lib/mysql and mounted with subPath mysql to avoid lost+found at volume root.
    - PostgreSQL persistent mount corrected from /data/postgres to /var/lib/postgresql/data and mounted with subPath pgdata to avoid lost+found at volume root.
    - Config-server PVC generated by Kompose was removed because /app/resources/config-files is config-like, not persistent runtime data, and the source directory was missing during conversion.
    - Prometheus PVC generated by Kompose was removed because /etc/prometheus/prometheus.yml is a config file path, not persistent runtime data, and the source file was missing during conversion.
    - Prometheus is deployed without the unsupported file mount; default image behavior is retained for baseline validation.
    - Kafka listener configuration was rewritten for single-pod Kubernetes-safe operation: internal broker/controller listeners use 0.0.0.0 bind addresses and Service DNS for advertised client access; localhost advertised listener was removed.
    - For the single-pod Kafka topology, controller quorum voter was rewritten to use pod-local controller endpoint on localhost:29093.
    - Kafka Service exposes internal client port 9092 and broker listener port 29092 so in-cluster clients can use the advertised Service DNS endpoint.
    - Added fsGroup where PVC-backed containers are likely to require writable mounted volumes: MongoDB, MySQL, PostgreSQL, and Grafana.
    - Kompose warnings carried forward: obsolete Compose version field; unsupported/missing host bind sources; missing Services for several services due to absent ports.
    - Unresolved artifact issue: config-server external config files and prometheus configuration file were missing at conversion time, so baseline manifests cannot recreate those source-mounted contents.
---
