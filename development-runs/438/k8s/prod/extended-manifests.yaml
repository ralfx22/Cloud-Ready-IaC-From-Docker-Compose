apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: account-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-api
    spec:
      containers:
        - name: account-api
          image: ralfx22/rrb-account-api
          imagePullPolicy: Always
          env:
            - name: spring.profiles.active
              value: docker
            - name: spring.cloud.config.uri
              value: http://config-server:8888/config-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api-mongo
  namespace: rrb-app
  labels:
    app.kubernetes.io/name: account-api-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account-api-mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-api-mongo
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: account-api-mongo
          image: mongo:6.0.5
          ports:
            - name: mongo
              containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: account-api-mongo-claim0
              mountPath: /data/db
      volumes:
        - name: account-api-mongo-claim0
          persistentVolumeClaim:
            claimName: account-api-mongo-claim0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
