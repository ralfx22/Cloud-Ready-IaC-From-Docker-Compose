apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotes
  namespace: sme-app
  labels:
    app: quotes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quotes
  template:
    metadata:
      labels:
        app: quotes
    spec:
      containers:
        - name: quotes
          image: ralfx22/sme-quotes:latest
          ports:
            - containerPort: 5000
          # container port inferred from QUOTES_API environment variable in 'api' service
          # probes omitted: no explicit probe configuration was provided in source
